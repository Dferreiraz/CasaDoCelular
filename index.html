<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa do Celular – Os Melhores Smartphones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/styles.css">
</head>

<body>

    <!-- Cursor personalizado -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <!-- ── Header ── -->
    <header>
        <nav>
            <div class="nav-logo">Casa do Celular</div>
            <ul class="nav-links">
                <li><a href="#" class="active">Início</a></li>
                <li><a href="#brands">Produtos</a></li>
                <li><a href="#promos">Promoções</a></li>
                <li><a href="#cta">Contato</a></li>
            </ul>
            <a href="https://wa.me/5511999999999" class="btn-whatsapp" target="_blank">
                <span class="icon">💬</span> WhatsApp
            </a>
        </nav>

        <!-- ── HERO ── -->
        <section class="hero">
            <div class="hero-bg-glow"></div>
            <div class="hero-bg-lines"></div>

            <div class="hero-text">
                <div class="hero-eyebrow">Casa do Celular</div>
                <h1>
                    OS <span class="accent">MELHORES</span><br>
                    <span class="outline">SMART</span><br>
                    PHONES
                </h1>
                <p class="hero-sub">Encontre dispositivos de alta qualidade com ofertas incríveis e uma experiência
                    premium.</p>
                <div class="hero-actions">
                    <a href="#brands" class="btn-primary">Ver Produtos</a>
                    <a href="#promos" class="btn-secondary">Ver Promoções</a>
                </div>
            </div>

            <div class="hero-visual">
                <div class="phone-container">
                    <div class="phone-glow"></div>
                    <img class="phone-img"
                        src=""
                        alt="Smartphone">
                    <div class="phone-frame"></div>
                </div>
            </div>
        </section>

    </header>

</body>

</html>
